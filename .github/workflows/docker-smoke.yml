name: Docker smoke (no rebuild)

# Stand-in for local Docker: pull public GHCR image and run Track 2 contract.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to smoke (latest or sha-...)"
        required: true
        default: "latest"

permissions:
  contents: read
  packages: read

env:
  IMAGE: ghcr.io/${{ github.repository }}:${{ inputs.image_tag }}

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Anonymous pull (judge-like)
        run: |
          set -euo pipefail
          echo "Pulling ${IMAGE} without registry login..."
          docker pull "${IMAGE}"
          docker image inspect "${IMAGE}" --format 'Id={{.Id}} Arch={{.Architecture}} Size={{.Size}}'

      - name: Run container (Track 2 mounts)
        id: run
        run: |
          set -euo pipefail
          mkdir -p output
          START=$(date +%s)
          set +e
          docker run --rm \
            -v "$PWD/test-input/tasks.json:/input/tasks.json:ro" \
            -v "$PWD/output:/output" \
            "${IMAGE}"
          CODE=$?
          set -e
          END=$(date +%s)
          ELAPSED=$((END - START))
          echo "exit_code=${CODE}" >> "$GITHUB_OUTPUT"
          echo "elapsed_s=${ELAPSED}" >> "$GITHUB_OUTPUT"
          echo "Container exit=${CODE} wall=${ELAPSED}s"
          if [ "${CODE}" -ne 0 ]; then
            echo "Non-zero exit — judges may report INFRA_ERROR"
            exit "${CODE}"
          fi
          if [ "${ELAPSED}" -gt 600 ]; then
            echo "Exceeded 10-minute cap (${ELAPSED}s)"
            exit 1
          fi

      - name: Validate results.json
        run: |
          python3 - <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          path = Path("output/results.json")
          if not path.exists():
              print("Missing output/results.json", file=sys.stderr)
              sys.exit(1)

          data = json.loads(path.read_text(encoding="utf-8"))
          if not isinstance(data, list) or not data:
              print("results.json must be a non-empty array", file=sys.stderr)
              sys.exit(1)

          required = {"formal", "sarcastic", "humorous_tech", "humorous_non_tech"}
          fail_markers = (
              re.compile(r"failed to (describe|caption|process)", re.I),
              re.compile(r"never showed up", re.I),
              re.compile(r"something happens in this clip", re.I),
          )
          warnings = 0
          for item in data:
              task_id = item.get("task_id")
              captions = item.get("captions")
              if not task_id or not isinstance(captions, dict):
                  print(f"Invalid item: {item}", file=sys.stderr)
                  sys.exit(1)
              missing = required - set(captions)
              if missing:
                  print(f"{task_id} missing styles: {missing}", file=sys.stderr)
                  sys.exit(1)
              for style, text in captions.items():
                  if not isinstance(text, str) or not text.strip():
                      print(f"{task_id}/{style} is empty", file=sys.stderr)
                      sys.exit(1)
                  if any(rx.search(text) for rx in fail_markers):
                      warnings += 1
                      print(f"WARN placeholder-like: {task_id}/{style}: {text[:120]}")

          print(f"OK: {len(data)} tasks, all styles present")
          if warnings:
              print(f"WARN: {warnings} placeholder-like captions (accuracy risk)")
          PY

      - name: Summary
        if: always()
        run: |
          echo "### Docker smoke" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ env.IMAGE }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Exit: \`${{ steps.run.outputs.exit_code }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Wall: \`${{ steps.run.outputs.elapsed_s }}s\` / 600s cap" >> "$GITHUB_STEP_SUMMARY"
